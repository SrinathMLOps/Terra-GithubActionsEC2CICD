name: AWS Destroy EC2 Instance

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "destroy" to confirm'
        required: true
        default: ''

jobs:
  destroy-ec2:
    name: 'Destroy EC2 Instance via AWS CLI'
    runs-on: ubuntu-latest
    environment: prod
    
    steps:
    - name: Verify Confirmation
      run: |
        if [ "${{ github.event.inputs.confirm }}" != "destroy" ]; then
          echo "Error: You must type 'destroy' to confirm"
          exit 1
        fi

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: eu-west-2

    - name: Find EC2 Instance
      id: find-instance
      run: |
        INSTANCE_ID=$(aws ec2 describe-instances \
          --filters "Name=tag:Name,Values=Production-Web-Server" \
                    "Name=instance-state-name,Values=running,pending,stopping,stopped" \
          --query "Reservations[0].Instances[0].InstanceId" \
          --output text)
        
        if [ "$INSTANCE_ID" == "None" ] || [ -z "$INSTANCE_ID" ]; then
          echo "No instance found with name 'Production-Web-Server'"
          echo "instance_found=false" >> $GITHUB_OUTPUT
        else
          echo "Found instance: $INSTANCE_ID"
          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT
          echo "instance_found=true" >> $GITHUB_OUTPUT
        fi

    - name: Terminate EC2 Instance
      if: steps.find-instance.outputs.instance_found == 'true'
      run: |
        INSTANCE_ID="${{ steps.find-instance.outputs.instance_id }}"
        echo "Terminating instance: $INSTANCE_ID"
        aws ec2 terminate-instances --instance-ids $INSTANCE_ID
        
        echo "Waiting for instance to terminate..."
        aws ec2 wait instance-terminated --instance-ids $INSTANCE_ID
        
        echo "✅ Instance $INSTANCE_ID has been terminated successfully!"

    - name: No Instance Found
      if: steps.find-instance.outputs.instance_found == 'false'
      run: |
        echo "ℹ️ No running instance found with name 'Production-Web-Server'"
        echo "The instance may have already been terminated."
